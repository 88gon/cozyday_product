    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #fffaf5; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(243, 156, 18, 0.08); width: 100%; max-width: 500px; box-sizing: border-box; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #d35400; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ffedda; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.3s; background-color: #fffbf5; }
        input[type="text"]:focus { border-color: #f39c12; }
        
        /* 롤링 피커 스타일 */
        .individual-pickers { display: flex; gap: 8px; }
        .picker-display { flex: 1; padding: 12px 5px; border: 2px solid #ffedda; border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: #fffbf5; cursor: pointer; color: #d35400; text-align: center; font-weight: bold; min-width: 0; }
        
        .rolling-picker-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; justify-content: center; }
        .rolling-picker-container { background: white; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .rolling-picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #ffedda; padding-bottom: 10px; }
        .rolling-picker-header h4 { margin: 0; color: #e67e22; }
        .done-btn { background: none; border: none; color: #f39c12; font-weight: bold; font-size: 1.1em; cursor: pointer; box-shadow: none; padding: 5px 10px; margin: 0; width: auto; }

        .rolling-picker-group { display: flex; justify-content: center; background: #fffbf5; border-radius: 10px; padding: 5px; border: 1px solid #ffedda; height: 160px; overflow: hidden; position: relative; }
        .rolling-picker-group::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to bottom, rgba(255,251,245,1), rgba(255,251,245,0)); pointer-events: none; z-index: 2; }
        .rolling-picker-group::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, rgba(255,251,245,1), rgba(255,251,245,0)); pointer-events: none; z-index: 2; }
        
        .rolling-picker { width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .rolling-picker::-webkit-scrollbar { display: none; }
        
        .picker-item { height: 40px; display: flex; align-items: center; justify-content: center; scroll-snap-align: center; font-size: 1em; color: #ccac93; transition: all 0.2s; cursor: pointer; }
        .picker-item.active { color: #e67e22; font-weight: bold; font-size: 1.2em; }
        
        .selection-bar { position: absolute; top: 60px; left: 5px; right: 5px; height: 40px; border-top: 1.5px solid #f39c12; border-bottom: 1.5px solid #f39c12; pointer-events: none; z-index: 1; background: rgba(243, 156, 18, 0.03); }

        button { width: 100%; padding: 15px; background-color: #f39c12; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; transition: all 0.3s; box-shadow: 0 4px 0 #d35400; }
        button:hover { background-color: #e67e22; transform: translateY(1px); box-shadow: 0 3px 0 #a04000; }
        button:active { transform: translateY(3px); box-shadow: none; }

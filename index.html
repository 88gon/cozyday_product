<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 운명 - 사주 분석</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6869816602894526"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6869816602894526">
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f9f6f2; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #5d4037; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #8d6e63; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #6d4c41; }
        #result { margin-top: 25px; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        
        /* 로딩 애니메이션 스타일 */
        .loading-area { display: none; text-align: center; padding: 30px 0; }
        .tiger-character { font-size: 60px; display: inline-block; animation: bounce 0.8s infinite ease-in-out; margin-bottom: 15px; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .loading-brand { font-size: 22px; font-weight: bold; color: #8d6e63; margin-bottom: 8px; }
        .loading-msg { color: #aaa; font-size: 14px; }

        /* 핵심 요약 및 아코디언(접기/펴기) UI 스타일 */
.core-summary { background-color: #5d4037; color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; text-align: center; line-height: 1.6; }
.core-summary h3 { margin: 0 0 10px 0; color: #fdf5e6; }
.core-summary .tags { color: #d7ccc8; font-size: 0.9em; margin-bottom: 15px; }
.accordion-item { border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
.accordion-header { background-color: #fdf5e6; padding: 15px; cursor: pointer; font-weight: bold; color: #5d4037; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.2s; }
.accordion-header:hover { background-color: #f5ebd9; }
.accordion-header::after { content: '▼'; font-size: 0.8em; transition: transform 0.3s; }
.accordion-header.active::after { transform: rotate(180deg); }
        .accordion-content { padding: 15px; display: none; background-color: white; line-height: 1.6; font-size: 0.95em; color: #333; border-top: 1px solid #ddd; }

        /* MBTI 소울메이트 섹션 스타일 */
        .soulmate-section { margin-top: 30px; padding: 20px; background-color: #fffaf0; border: 2px dashed #8d6e63; border-radius: 15px; text-align: center; }
        .soulmate-title { font-weight: bold; color: #5d4037; margin-bottom: 15px; font-size: 1.1em; }
        .soulmate-character { font-size: 50px; margin-bottom: 10px; display: block; animation: float 3s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .soulmate-info { background: white; padding: 10px; border-radius: 10px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .soulmate-mbti { font-weight: bold; color: #e67e22; font-size: 1.2em; }
        .soulmate-desc { font-size: 0.9em; color: #666; margin-top: 5px; }

        /* 푸터 스타일 */
        footer { margin-top: 50px; padding: 20px; text-align: center; font-size: 0.85em; color: #888; border-top: 1px solid #eee; width: 100%; max-width: 500px; }
        footer a { color: #888; text-decoration: none; margin: 0 10px; }
        footer a:hover { text-decoration: underline; color: #5d4037; }
        .copyright { margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 사주팔자 분석</h2>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="userName" placeholder="이름을 입력하세요">
    </div>
    <div class="input-group">
        <label>생년월일</label>
        <div style="display: flex; gap: 5px;">
            <select id="birthYear" style="flex: 2;"></select>
            <select id="birthMonth" style="flex: 1;"></select>
            <select id="birthDay" style="flex: 1;"></select>
        </div>
    </div>
    <div class="input-group">
        <label>성별</label>
        <select id="userGender">
            <option value="1">남성 (乾命)</option>
            <option value="0">여성 (坤命)</option>
        </select>
    </div>
    <div class="input-group">
        <label>태어난 시간</label>
        <div style="display: flex; gap: 5px;">
            <select id="birthHour" style="flex: 1;"></select>
            <select id="birthMinute" style="flex: 1;"></select>
        </div>
    </div>
    <button onclick="calculateSaju()">운세 확인하기</button>

    <div id="result">
        <h3 id="resultTitle" style="text-align: center;"></h3>
        
        <div id="sajuTable"></div>
        
        <div id="loadingArea" class="loading-area">
            <div class="tiger-character">🐯</div>
            <div class="loading-brand">49사주</div>
            <div class="loading-msg">당신의 운명을 읽어보고 있어요...</div>
        </div>

        <div id="resultArea"></div>
    </div>
</div>

<footer>
    <div class="footer-links">
        <a href="about.html">서비스 소개</a> |
        <a href="privacy.html">개인정보처리방침</a> |
        <a href="contact.html">문의하기</a>
    </div>
    <div class="copyright">
        &copy; 2026 49사주. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script src="sajuData.js"></script>
<script src="main.js"></script>
</body>
</html>

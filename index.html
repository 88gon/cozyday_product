<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 운명 - 사주 분석</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f9f6f2; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #5d4037; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #8d6e63; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #6d4c41; }
        #result { margin-top: 25px; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        .saju-table { width: 100%; text-align: center; border-collapse: collapse; margin-top: 10px; }
        .saju-table th, .saju-table td { border: 1px solid #ddd; padding: 10px; }
        .saju-table th { background-color: #fdf5e6; }
        #geminiInterpretation { background-color: #f0f8ff; border-left: 4px solid #4a90e2; padding: 15px; margin-top: 20px; line-height: 1.7; color: #333; }
        .inquiry-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-top: 30px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; height: 100px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 사주팔자 분석</h2>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="userName" placeholder="이름을 입력하세요">
    </div>
    <div class="input-group">
        <label>생년월일</label>
        <div style="display: flex; gap: 5px;">
            <select id="birthYear" style="flex: 2;"></select>
            <select id="birthMonth" style="flex: 1;"></select>
            <select id="birthDay" style="flex: 1;"></select>
        </div>
    </div>
    <div class="input-group">
        <label>성별</label>
        <select id="userGender">
            <option value="1">남성 (乾命)</option>
            <option value="0">여성 (坤命)</option>
        </select>
    </div>
    <div class="input-group">
        <label>태어난 시간</label>
        <div style="display: flex; gap: 5px;">
            <select id="birthHour" style="flex: 1;"></select>
            <select id="birthMinute" style="flex: 1;"></select>
        </div>
    </div>
    <button onclick="calculateSaju()">운세 확인하기</button>

    <div id="result">
        <h3 id="resultTitle"></h3>
        <table class="saju-table">
            <tr>
                <th>시주(時)</th>
                <th>일주(日)</th>
                <th>월주(月)</th>
                <th>년주(年)</th>
            </tr>
            <tr id="heavenlyStems"> <td>?</td><td>?</td><td>?</td><td>?</td>
            </tr>
            <tr id="earthlyBranches"> <td>?</td><td>?</td><td>?</td><td>?</td>
            </tr>
        </table>
        <p id="interpretation" style="line-height: 1.6; color: #444; margin-top: 15px;"></p>
        <div id="geminiInterpretation"></div>
    </div>
</div>

<div class="inquiry-container">
    <h2>🤝 제휴 문의</h2>
    <form action="https://formspree.io/f/xbdzjvzp" method="POST">
        <div class="input-group">
            <label>성함 / 기업명</label>
            <input type="text" name="name" placeholder="성함 또는 기업명을 입력해주세요" required>
        </div>
        <div class="input-group">
            <label>이메일 주소</label>
            <input type="email" name="_replyto" placeholder="답변받으실 이메일을 입력해주세요" required>
        </div>
        <div class="input-group">
            <label>문의 내용</label>
            <textarea name="message" placeholder="제휴 관련 내용을 상세히 적어주세요" required></textarea>
        </div>
        <button type="submit">문의 보내기</button>
    </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

<!-- 사주 라이브러리 (lunar-javascript) -->
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script src="main.js"></script>
</body>
</html>
